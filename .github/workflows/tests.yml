name: 🧪 Tests Automáticos

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v3
    
    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 🧪 Ejecutar tests (Property-based)
      run: |
        pytest test/test_config_properties.py -v
    
    - name: 📊 Generar reporte de cobertura
      run: |
        pip install pytest-cov
        pytest --cov=. --cov-report=xml test/test_config_properties.py
    
    - name: 📈 Subir cobertura a Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v3
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 Instalar herramientas de lint
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: 🔍 Verificar formato con Black
      run: black --check . --exclude=venv
      continue-on-error: true
    
    - name: 📋 Verificar imports con isort
      run: isort --check-only . --skip=venv
      continue-on-error: true
    
    - name: 🎯 Verificar estilo con Flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

  documentation:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v3
    
    - name: ✅ Verificar archivos de documentación
      run: |
        test -f Readme.md && echo "✅ Readme.md existe" || exit 1
        test -f CONTRIBUTING.md && echo "✅ CONTRIBUTING.md existe" || exit 1
        test -f CHANGELOG.md && echo "✅ CHANGELOG.md existe" || exit 1
        test -f LICENSE && echo "✅ LICENSE existe" || exit 1
